const AppCtx = createContext(null);

function useLocalStorage(key, def) {
  const [v, setV] = useState(() => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; } });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }, [key, v]);
  return [v, setV];
}

function AppProvider({ children }) {
  const [peers, setPeers] = useLocalStorage('peers_v2', DEFAULT_PEERS);
  const [entries, setEntries] = useLocalStorage('entries_v2', SAMPLE_ENTRIES);
  const [apiKey, setApiKey] = useLocalStorage('api_key', '');

  const addPeer = useCallback((p) => setPeers(ps => {
    const newPeer = { ...p, id: Date.now().toString(), color: PEER_COLORS[ps.length % PEER_COLORS.length] };
    const sorted = [...ps, newPeer].sort((a, b) => (b.isHome ? 1 : 0) - (a.isHome ? 1 : 0));
    return sorted;
  }), []);
  const removePeer = useCallback((id) => { setPeers(ps => ps.filter(p => p.id !== id)); setEntries(es => es.filter(e => e.peerId !== id)); }, []);
  const updatePeer = useCallback((id, data) => setPeers(ps => ps.map(p => p.id === id ? { ...p, ...data } : p)), []);

  const saveEntry = useCallback((entry) => {
    setEntries(es => {
      const idx = es.findIndex(e => e.id === entry.id);
      if (idx >= 0) { const next = [...es]; next[idx] = entry; return next; }
      return [...es, entry];
    });
  }, []);
  const deleteEntry = useCallback((id) => setEntries(es => es.filter(e => e.id !== id)), []);

  const getLatestEntry = useCallback((peerId) => {
    const peerEntries = entries.filter(e => e.peerId === peerId).sort((a, b) => {
      if (a.year !== b.year) return b.year - a.year;
      return QUARTER_ORDER[b.quarter] - QUARTER_ORDER[a.quarter];
    });
    return peerEntries[0] || null;
  }, [entries]);

  const getPeerEntries = useCallback((peerId) => {
    return entries.filter(e => e.peerId === peerId).sort((a, b) => {
      if (a.year !== b.year) return b.year - a.year;
      return QUARTER_ORDER[b.quarter] - QUARTER_ORDER[a.quarter];
    });
  }, [entries]);

  const allQuarters = useMemo(() => {
    const set = new Set(entries.map(e => `${e.year}-${e.quarter}`));
    return [...set].sort((a, b) => {
      const [ay, aq] = a.split('-'); const [by, bq] = b.split('-');
      if (ay !== by) return by - ay;
      return QUARTER_ORDER[bq] - QUARTER_ORDER[aq];
    }).map(k => { const [y, q] = k.split('-'); return { year: parseInt(y), quarter: q }; });
  }, [entries]);

  return (
    <AppCtx.Provider value={{ peers, setPeers, entries, apiKey, setApiKey, addPeer, removePeer, updatePeer, saveEntry, deleteEntry, getLatestEntry, getPeerEntries, allQuarters }}>
      {children}
    </AppCtx.Provider>
  );
}

function fmtKPI(kpi, def) {
  if (!kpi || kpi.v === null || kpi.v === undefined) return { val: '—', up: null, dn: null };
  const val = def.unit === '%' ? `${kpi.v.toFixed(1)}%` : (kpi.label ? kpi.label : kpi.v.toLocaleString());
  return { val };
}

function ChangeChip({ change, hib, size = 'sm' }) {
  if (change === null || change === undefined) return null;
  if (change === 0) return <span className="kpi-neutral text-xs">0pp</span>;
  const isGood = hib ? change > 0 : change < 0;
  const sign = change > 0 ? '+' : '';
  const cls = isGood ? 'kpi-up' : 'kpi-down';
  const arrow = change > 0 ? '↑' : '↓';
  return <span className={`${cls} text-xs font-medium`}>{arrow} {sign}{Math.abs(change).toFixed(1)}pp</span>;
}

function StatusDot({ entry }) {
  if (!entry) return <span className="tag bg-slate-100 text-slate-500">No data</span>;
  const qoq = entry.kpis?.netIncome?.qoq;
  if (qoq === null || qoq === undefined) return <span className="tag bg-slate-100 text-slate-500">—</span>;
  if (qoq > 0) return <span className="tag bg-green-50 text-green-700">↑ Net Income</span>;
  if (qoq < 0) return <span className="tag bg-red-50 text-red-700">↓ Net Income</span>;
  return <span className="tag bg-slate-100 text-slate-500">→ Flat</span>;
}

    saveEntry(draft);
    setEditing(false);

  function handleDelete() {

// TREND CHART (Chart.js)
// ──────────────────────────────────────────────
function TrendChart({ peers, entries, selectedKPI, quarters }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    const def = KPI_DEFS.find(d => d.key === selectedKPI);
    const labels = [...quarters].reverse().map(({ quarter, year }) => `${quarter} ${year}`);

    const datasets = peers.map(peer => {
      const data = [...quarters].reverse().map(({ quarter, year }) => {
        const e = entries.find(e => e.peerId === peer.id && e.quarter === quarter && e.year === year);
        return e?.kpis?.[selectedKPI]?.v ?? null;
      });
      return {
        label: peer.name,
        data,
        borderColor: peer.color,
        backgroundColor: peer.color + '22',
        pointBackgroundColor: peer.color,
        tension: 0.3,
        spanGaps: true,
      };
    });

    if (chartRef.current) { chartRef.current.destroy(); }
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 12 }, boxWidth: 12 } },
          tooltip: { mode: 'index', intersect: false },
          title: { display: true, text: `${def?.desc || selectedKPI} (%)`, color: '#374151', font: { size: 13, weight: '500' } },
        },
        scales: {
          y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 }, callback: v => `${v}${def?.unit || ''}` } },
          x: { grid: { display: false }, ticks: { font: { size: 11 } } },
        },
        interaction: { mode: 'nearest', axis: 'x', intersect: false },
      }
    });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [peers, entries, selectedKPI, quarters]);

  return <div style={{ height: '280px' }}><canvas ref={canvasRef}></canvas></div>;
}

function SearchView({ setView, setSelectedPeer }) {
  const { peers, entries } = useContext(AppCtx);
  const [q, setQ] = useState('');

  const results = useMemo(() => {
    if (!q.trim() || q.length < 2) return [];
    const lq = q.toLowerCase();
    const hits = [];
    entries.forEach(e => {
      const peer = peers.find(p => p.id === e.peerId);
      if (!peer) return;
      const fields = [
        { label:'Headline', text: e.headlineTakeaway },
        { label:'Summary', text: (e.earningsSummary || []).join(' ') },
        { label:'Strategy', text: e.strategyGuidance },
        { label:'Q&A', text: e.qaSummary },
        { label:'Concerns', text: (e.investorConcerns || []).join(' ') },
      ];
      fields.forEach(f => {
        if (f.text && f.text.toLowerCase().includes(lq)) {
          const idx = f.text.toLowerCase().indexOf(lq);
          const excerpt = '…' + f.text.slice(Math.max(0, idx - 40), idx + 80) + '…';
          hits.push({ entry: e, peer, section: f.label, excerpt });
        }
      });
    });
    return hits.slice(0, 30);
  }, [q, entries, peers]);

  function highlight(text) {
    const parts = text.split(new RegExp(`(${q})`, 'gi'));
    return parts.map((p, i) =>
      p.toLowerCase() === q.toLowerCase()
        ? <mark key={i} className="bg-yellow-200 rounded px-0.5">{p}</mark>
        : p
    );
  }

  return (
    <div className="max-w-4xl mx-auto px-6 py-8">
      <h1 className="text-xl font-bold text-gray-900 mb-6">Search Archive</h1>
      <div className="relative mb-6">
        <div className="absolute inset-y-0 left-3 flex items-center text-gray-400 pointer-events-none"><Icons.Search /></div>
        <input type="text" value={q} onChange={e => setQ(e.target.value)}
          placeholder="Search across all peer entries — transcripts, KPIs, concerns…"
          style={{paddingLeft:'36px', fontSize:'15px', padding:'12px 12px 12px 40px'}}
          autoFocus />
      </div>
      {q.length >= 2 && results.length === 0 && (
        <p className="text-gray-400 text-sm">No results for "{q}"</p>
      )}
      <div className="space-y-3">
        {results.map((r, i) => (
          <div key={i} className="card p-4 hover:shadow-sm cursor-pointer transition-shadow"
            onClick={() => { setSelectedPeer(r.peer.id); setView('peer-detail'); }}>
            <div className="flex items-center gap-2 mb-1.5">
              <div className="w-5 h-5 rounded flex items-center justify-center text-white text-xs font-bold" style={{background: r.peer.color}}>{(r.peer.initials||'?')[0]}</div>
              <span className="font-semibold text-sm text-gray-900">{r.peer.flag} {r.peer.name}</span>
              {r.peer.ticker && <span className="text-xs font-mono text-gray-400 bg-slate-100 px-1 rounded">{r.peer.ticker}</span>}
              <span className="text-xs text-gray-400">{r.entry.quarter} {r.entry.year}</span>
              <span className="tag bg-slate-100 text-slate-600 ml-auto">{r.section}</span>
            </div>
            <p className="text-sm text-gray-600">{highlight(r.excerpt)}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

const EMPTY_KPIS = () => Object.fromEntries(KPI_DEFS.map(d => [d.key, { v: null, qoq: null, yoy: null }]));

function AddEntryModal({ initialPeerId, onClose }) {
  const { peers, saveEntry, apiKey } = useContext(AppCtx);
  const [step, setStep] = useState(1); // 1=source, 2=review
  const [peerId, setPeerId] = useState(initialPeerId || peers[0]?.id || '');
  const [quarter, setQuarter] = useState('Q1');
  const [year, setYear] = useState(new Date().getFullYear());
  const [sourceText, setSourceText] = useState('');
  const [generating, setGenerating] = useState(false);
  const [genError, setGenError] = useState('');
  const [form, setForm] = useState({
    headlineTakeaway: '',
    earningsSummary: ['', '', '', '', ''],
    kpis: EMPTY_KPIS(),
    strategyGuidance: '',
    qaSummary: '',
    investorConcerns: ['', '', '', '', ''],
  });

  const peer = peers.find(p => p.id === peerId);
  const entryId = `${peerId}-${quarter}-${year}`;

  async function generate() {
    if (!apiKey) { setGenError('Please add your Claude API key in Settings first.'); return; }
    if (!sourceText.trim()) { setGenError('Please paste some source material first.'); return; }
    setGenerating(true);
    setGenError('');
    try {
      const prompt = `You are a financial analysis assistant for Halyk Bank's Investor Relations team.

Analyze the following earnings material for ${peer?.name || 'this bank'} (${quarter} ${year}) and extract structured data.

Return ONLY valid JSON matching this exact schema — no markdown, no explanation:
{
  "headlineTakeaway": "one concise sentence summarizing the quarter",
  "earningsSummary": ["bullet 1", "bullet 2", "bullet 3", "bullet 4", "bullet 5"],
  "kpis": {
    "nim": {"v": number_or_null, "qoq": number_or_null, "yoy": number_or_null},
    "roe": {"v": number_or_null, "qoq": number_or_null, "yoy": number_or_null},
    "roa": {"v": number_or_null, "qoq": number_or_null, "yoy": number_or_null},
    "costToIncome": {"v": number_or_null, "qoq": number_or_null, "yoy": number_or_null},
    "nplRatio": {"v": number_or_null, "qoq": number_or_null, "yoy": number_or_null},
    "cet1": {"v": number_or_null, "qoq": number_or_null, "yoy": number_or_null},
    "loanGrowth": {"v": number_or_null, "qoq": null, "yoy": number_or_null},
    "netIncome": {"v": number_or_null, "qoq": number_or_null, "yoy": number_or_null, "label": "formatted string e.g. KZT 415bn"}
  },
  "strategyGuidance": "paragraph of management forward-looking commentary and guidance",
  "qaSummary": "paragraph summarizing key Q&A themes from analyst questions",
  "investorConcerns": ["concern 1", "concern 2", "concern 3", "concern 4", "concern 5"]
}

Rules: all % changes (qoq, yoy) are in percentage points. Use null for any values not found. Keep earningsSummary to exactly 5 bullets. Keep investorConcerns to exactly 5 items.

SOURCE MATERIAL:
${sourceText.slice(0, 15000)}`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 2048,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message || 'API error'); }
      const data = await res.json();
      const text = data.content[0].text;
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('Could not parse response');
      const parsed = JSON.parse(jsonMatch[0]);
      setForm(f => ({
        headlineTakeaway: parsed.headlineTakeaway || f.headlineTakeaway,
        earningsSummary: parsed.earningsSummary?.length ? parsed.earningsSummary : f.earningsSummary,
        kpis: parsed.kpis ? { ...EMPTY_KPIS(), ...parsed.kpis } : f.kpis,
        strategyGuidance: parsed.strategyGuidance || f.strategyGuidance,
        qaSummary: parsed.qaSummary || f.qaSummary,
        investorConcerns: parsed.investorConcerns?.length ? parsed.investorConcerns : f.investorConcerns,
      }));
      setStep(2);
    } catch(e) {
      setGenError(e.message);
    }
    setGenerating(false);
  }

  function handleSave() {
    const entry = { id: entryId, peerId, quarter, year: parseInt(year), ...form, status: 'final', createdAt: Date.now() };
    saveEntry(entry);
    onClose(peerId);
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose(null)}>
      <div className="modal-box">
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-200 sticky top-0 bg-white rounded-t-xl z-10">
          <h2 className="font-semibold text-gray-900">{step === 1 ? 'Add New Entry' : 'Review & Edit Generated Content'}</h2>
          <button onClick={() => onClose(null)} className="text-gray-400 hover:text-gray-600"><Icons.X /></button>
        </div>

        <div className="p-6">
          {step === 1 && (
            <div className="space-y-4">
              <div className="grid grid-cols-3 gap-3">
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Bank</label>
                  <select value={peerId} onChange={e => setPeerId(e.target.value)}>
                    {peers.map(p => <option key={p.id} value={p.id}>{p.flag} {p.name}{p.ticker ? ` (${p.ticker})` : ''}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Quarter</label>
                  <select value={quarter} onChange={e => setQuarter(e.target.value)}>
                    {['Q1','Q2','Q3','Q4'].map(q => <option key={q}>{q}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium text-gray-600 mb-1">Year</label>
                  <select value={year} onChange={e => setYear(e.target.value)}>
                    {[2023,2024,2025,2026,2027].map(y => <option key={y}>{y}</option>)}
                  </select>
                </div>
              </div>

              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">
                  Source Material
                  <span className="text-gray-400 font-normal ml-1">— paste earnings transcript, investor presentation text, or KPI sheet</span>
                </label>
                <textarea rows={12} value={sourceText} onChange={e => setSourceText(e.target.value)}
                  placeholder="Paste the full earnings call transcript, investor presentation text, or financial highlights here. The AI will extract the five structured sections automatically." />
              </div>

              {genError && <div className="text-sm text-red-600 bg-red-50 border border-red-200 rounded p-3">{genError}</div>}

              <div className="flex gap-3 pt-2">
                <button className="btn btn-primary flex-1" onClick={generate} disabled={generating}>
                  {generating ? <><Icons.Spinner />Generating…</> : <><Icons.AI />Generate with AI</>}
                </button>
                <button className="btn btn-secondary" onClick={() => setStep(2)}>
                  Enter manually →
                </button>
              </div>
              {!apiKey && <p className="text-xs text-amber-600 text-center">⚠ No API key set — AI generation requires a Claude API key in Settings</p>}
            </div>
          )}

          {step === 2 && (
            <div className="space-y-5">
              <div className="text-xs text-gray-500 bg-blue-50 border border-blue-100 rounded p-3">
                Review and edit the AI-generated content below before saving. All fields are editable.
              </div>

              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Headline Takeaway</label>
                <input type="text" value={form.headlineTakeaway} onChange={e => setForm(f => ({...f, headlineTakeaway: e.target.value}))} placeholder="One sentence summary of the quarter" />
              </div>

              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Earnings Summary (3–5 bullets)</label>
                {form.earningsSummary.map((b, i) => (
                  <div key={i} className="flex gap-2 mb-2">
                    <input type="text" value={b} onChange={e => { const a = [...form.earningsSummary]; a[i] = e.target.value; setForm(f => ({...f, earningsSummary: a})); }} placeholder={`Bullet ${i+1}`} />
                    <button className="btn btn-secondary btn-sm" onClick={() => setForm(f => ({...f, earningsSummary: f.earningsSummary.filter((_,j) => j !== i)}))}>
                      <Icons.X />
                    </button>
                  </div>
                ))}
                {form.earningsSummary.length < 7 && (
                  <button className="btn btn-secondary btn-sm" onClick={() => setForm(f => ({...f, earningsSummary: [...f.earningsSummary, '']}))}>
                    <Icons.Plus />Add bullet
                  </button>
                )}
              </div>

              <div>
                <label className="block text-xs font-medium text-gray-600 mb-2">KPIs</label>
                <div className="grid grid-cols-2 gap-2">
                  {KPI_DEFS.map(def => (
                    <div key={def.key} className="p-2 bg-slate-50 rounded border border-slate-100">
                      <div className="text-xs font-medium text-gray-600 mb-1">{def.label} ({def.unit || 'value'})</div>
                      <div className="flex gap-1">
                        {['v','qoq','yoy'].map(f => (
                          <input key={f} type="text" style={{width:'60px', fontSize:'12px', padding:'4px 6px'}}
                            value={form.kpis[def.key]?.[f] ?? ''} placeholder={f}
                            onChange={e => { const val = e.target.value === '' ? null : parseFloat(e.target.value);
                              setForm(fr => ({ ...fr, kpis: { ...fr.kpis, [def.key]: { ...(fr.kpis[def.key]||{}), [f]: val } } })); }} />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <p className="text-xs text-gray-400 mt-1">Fields: value | QoQ change (pp) | YoY change (pp)</p>
              </div>

              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Strategy & Guidance</label>
                <textarea rows={4} value={form.strategyGuidance} onChange={e => setForm(f => ({...f, strategyGuidance: e.target.value}))} placeholder="Management's forward-looking commentary and guidance updates" />
              </div>

              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Q&A Summary</label>
                <textarea rows={4} value={form.qaSummary} onChange={e => setForm(f => ({...f, qaSummary: e.target.value}))} placeholder="Key themes and topics from the analyst Q&A" />
              </div>

              <div>
                <label className="block text-xs font-medium text-gray-600 mb-1">Investor Concerns</label>
                {form.investorConcerns.map((c, i) => (
                  <div key={i} className="flex gap-2 mb-2">
                    <input type="text" value={c} onChange={e => { const a = [...form.investorConcerns]; a[i] = e.target.value; setForm(f => ({...f, investorConcerns: a})); }} placeholder={`Concern ${i+1}`} />
                    <button className="btn btn-secondary btn-sm" onClick={() => setForm(f => ({...f, investorConcerns: f.investorConcerns.filter((_,j) => j !== i)}))}>
                      <Icons.X />
                    </button>
                  </div>
                ))}
                {form.investorConcerns.length < 8 && (
                  <button className="btn btn-secondary btn-sm" onClick={() => setForm(f => ({...f, investorConcerns: [...f.investorConcerns, '']}))}>
                    <Icons.Plus />Add concern
                  </button>
                )}
              </div>

              <div className="flex gap-3 pt-2 border-t border-gray-100">
                <button className="btn btn-secondary" onClick={() => setStep(1)}>← Back</button>
                <button className="btn btn-primary flex-1" onClick={handleSave}>Save Entry</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────
// SETTINGS MODAL
// ──────────────────────────────────────────────
function SettingsModal({ onClose }) {
  const { peers, addPeer, removePeer, updatePeer, apiKey, setApiKey } = useContext(AppCtx);
  const [newName, setNewName] = useState('');
  const [newTicker, setNewTicker] = useState('');
  const [newCountry, setNewCountry] = useState('Kazakhstan');
  const [newFlag, setNewFlag] = useState('🏦');
  const [newInitials, setNewInitials] = useState('');
  const [newCategory, setNewCategory] = useState('core');
  const [localKey, setLocalKey] = useState(apiKey);
  const [showKey, setShowKey] = useState(false);

  function handleAddPeer() {
    if (!newName.trim()) return;
    addPeer({ name: newName.trim(), ticker: newTicker.trim().toUpperCase(), country: newCountry, flag: newFlag, initials: newInitials.trim() || newName.slice(0,3).toUpperCase(), category: newCategory });
    setNewName(''); setNewTicker(''); setNewInitials(''); setNewFlag('🏦');
  }

  function handleSaveKey() { setApiKey(localKey.trim()); }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        <div className="flex items-center justify-between px-6 py-4 border-b border-gray-200 sticky top-0 bg-white rounded-t-xl z-10">
          <h2 className="font-semibold text-gray-900">Settings</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><Icons.X /></button>
        </div>
        <div className="p-6 space-y-8">

          {/* API Key */}
          <div>
            <h3 className="text-sm font-semibold text-gray-800 mb-1">Claude API Key</h3>
            <p className="text-xs text-gray-500 mb-3">Required for AI-assisted content generation. Your key is stored locally in this browser only.</p>
            <div className="flex gap-2">
              <input type={showKey ? 'text' : 'password'} value={localKey} onChange={e => setLocalKey(e.target.value)}
                placeholder="sk-ant-api…" />
              <button className="btn btn-secondary btn-sm" style={{whiteSpace:'nowrap'}} onClick={() => setShowKey(v => !v)}>
                {showKey ? 'Hide' : 'Show'}
              </button>
              <button className="btn btn-primary btn-sm" onClick={handleSaveKey}>Save</button>
            </div>
            {apiKey && <p className="text-xs text-green-600 mt-1">✓ API key is set</p>}
          </div>

          {/* Manage Peers */}
          <div>
            <h3 className="text-sm font-semibold text-gray-800 mb-3">Tracked Peer Banks</h3>
            <div className="space-y-2 mb-4">
              {peers.map(p => (
                <div key={p.id} className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
                  <div className="w-7 h-7 rounded flex items-center justify-center text-white font-bold text-xs flex-shrink-0" style={{background: p.color}}>
                    {(p.initials||'?')[0]}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-gray-800">{p.flag} {p.name} {p.ticker && <span className="text-xs font-mono text-gray-400">({p.ticker})</span>}</div>
                    <div className="flex items-center gap-2 mt-0.5">
                      <span className="text-xs text-gray-400">{p.country}</span>
                      <CategoryBadge category={p.category} />
                      {p.isHome && <span className="text-xs text-blue-600 font-medium">★ Home bank</span>}
                    </div>
                  </div>
                  {!p.isHome && (
                    <button className="btn btn-danger btn-sm" onClick={() => { if(confirm(`Remove ${p.name} and all its entries?`)) removePeer(p.id); }}>
                      <Icons.Trash />
                    </button>
                  )}
                </div>
              ))}
            </div>
            <div className="border border-dashed border-gray-300 rounded-lg p-4">
              <h4 className="text-xs font-medium text-gray-600 mb-3 uppercase tracking-wide">Add New Bank</h4>
              <div className="grid grid-cols-4 gap-2 mb-2">
                <input type="text" value={newName} onChange={e => setNewName(e.target.value)} placeholder="Bank name" style={{gridColumn:'span 2'}} />
                <input type="text" value={newTicker} onChange={e => setNewTicker(e.target.value)} placeholder="Ticker" />
                <input type="text" value={newInitials} onChange={e => setNewInitials(e.target.value)} placeholder="Initials" />
              </div>
              <div className="grid grid-cols-4 gap-2 mb-2">
                <input type="text" value={newFlag} onChange={e => setNewFlag(e.target.value)} placeholder="🏦" style={{width:'60px'}} />
                <input type="text" value={newCountry} onChange={e => setNewCountry(e.target.value)} placeholder="Country" style={{gridColumn:'span 2'}} />
                <select value={newCategory} onChange={e => setNewCategory(e.target.value)}>
                  <option value="core">Core Peer</option>
                  <option value="cee">CEE Peer</option>
                  <option value="adjacent">Adjacent Financial</option>
                </select>
              </div>
              <button className="btn btn-primary" onClick={handleAddPeer}><Icons.Plus />Add Bank</button>
            </div>
          </div>

          {/* Data Management */}
          <div>
            <h3 className="text-sm font-semibold text-gray-800 mb-1">Data & Privacy</h3>
            <p className="text-xs text-gray-500 mb-3">All data is stored locally in your browser's localStorage. Nothing is sent to external servers except AI generation requests to the Anthropic API.</p>
            <button className="btn btn-danger btn-sm" onClick={() => {
              if(confirm('Clear all saved data and reset to sample data? This cannot be undone.')) {
                localStorage.removeItem('peers_v2');
                localStorage.removeItem('entries_v2');
                window.location.reload();
              }
            }}>Reset to sample data</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────
// APP ROOT
// ──────────────────────────────────────────────
function App() {
  const [view, setView] = useState('dashboard');
  const [selectedPeer, setSelectedPeer] = useState(null);
  const [addEntryPeer, setAddEntryPeer] = useState(undefined); // undefined=closed, null=any peer, string=specific peer
  const [showSettings, setShowSettings] = useState(false);

  function openAddEntry(peerId) { setAddEntryPeer(peerId === undefined ? null : peerId); }

  return (
    <AppProvider>
      <div className="min-h-screen flex flex-col">
        <Header view={view} setView={(v) => { setView(v); }} onSettings={() => setShowSettings(true)} />
        <main className="flex-1">
          {view === 'dashboard' && (
            <DashboardView
              setView={setView}
              setSelectedPeer={setSelectedPeer}
              openAddEntry={openAddEntry}
            />
          )}
          {view === 'peer-detail' && selectedPeer && (
            <PeerDetailView
              peerId={selectedPeer}
              setView={setView}
              openAddEntry={openAddEntry}
            />
          )}
          {view === 'peer-detail' && !selectedPeer && (
            <div className="p-12 text-center text-gray-400">
              <p className="mb-3">Select a bank from the dashboard to view its detail.</p>
              <button className="btn btn-primary" onClick={() => setView('dashboard')}>Go to Dashboard</button>
            </div>
          )}
          {view === 'compare' && <ComparisonView />}
          {view === 'search' && <SearchView setView={setView} setSelectedPeer={setSelectedPeer} />}
        </main>

        {addEntryPeer !== undefined && (
          <AddEntryModal
            initialPeerId={addEntryPeer}
            onClose={(peerId) => {
              setAddEntryPeer(undefined);
              if (peerId) { setSelectedPeer(peerId); setView('peer-detail'); }
            }}
          />
        )}
        {showSettings && <SettingsModal onClose={() => setShowSettings(false)} />}
      </div>
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
